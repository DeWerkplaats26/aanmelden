<script>
const params = new URLSearchParams(window.location.search);
const sheetName = params.get("sheet") || "Sheet1";

const URL = "https://script.google.com/macros/s/AKfycbypPFBDmABPfDLdwWFosDjUimPlt1eoTL8ttGOXRUVmIe2my5dn9h4yPnpxn9Q0OHhznA/exec";
let beschikbarePlekken = 0;

// ➕ Persoon toevoegen
function addPersoon() {
  const container = document.getElementById("personen");
  if (!container) return; // 🔥 voorkomt error

  const count = container.children.length + 1;

  const div = document.createElement("div");
  div.className = "persoon";

  div.innerHTML = `
    <h4>Persoon ${count}</h4>
    <input placeholder="Naam" required>
    <input type="number" placeholder="Leeftijd" required>
    <input placeholder="Telefoon">
    <input type="email" placeholder="Email">
  `;

  container.appendChild(div);
}

// ❌ verwijderen
function removeLast() {
  const container = document.getElementById("personen");
  if (container && container.lastElementChild) {
    container.lastElementChild.remove();
  }
}

// 📊 teller ophalen
function updateCount() {
  const script = document.createElement("script");
  script.src = URL + "?sheet=" + sheetName + "&callback=handleCount";
  document.body.appendChild(script);
}

function handleCount(data) {
  beschikbarePlekken = data.left;

  // titel uit sheet
  document.getElementById("titel").innerText = data.name;

  const status = document.getElementById("status");

  if (data.left > 0) {
    status.innerText = data.left + " plekken beschikbaar";
  } else {
    status.innerText = "Workshop is VOL";
    document.getElementById("btn").disabled = true;
  }

  document.getElementById("statusTop").innerText = "✔ geladen";
}

// 🚀 verzenden
function sendData(e) {
  e.preventDefault();

  const personenDivs = document.querySelectorAll(".persoon");
  let personen = [];

  personenDivs.forEach(div => {
    const inputs = div.querySelectorAll("input");

    personen.push({
      naam: inputs[0].value,
      leeftijd: inputs[1].value,
      telefoon: inputs[2].value,
      email: inputs[3].value,
      sheet: sheetName
    });
  });

  if (personen.length === 0) {
    alert("Voeg minstens 1 persoon toe");
    return;
  }

  if (personen.length > beschikbarePlekken) {
    alert("Er zijn nog maar " + beschikbarePlekken + " plekken!");
    return;
  }

  document.getElementById("btn").disabled = true;
  document.getElementById("melding").innerText = "Bezig met verzenden...";

  fetch(URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(personen),
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    }
  })
  .then(() => {
    document.getElementById("melding").innerText = "✅ Aanmelding gelukt!";
    document.getElementById("personen").innerHTML = "";
    addPersoon();
    document.getElementById("btn").disabled = false;
  })
  .catch(() => {
    document.getElementById("melding").innerText = "❌ Fout bij verzenden";
    document.getElementById("btn").disabled = false;
  });
}

// 🚀 START (pas als pagina geladen is)
window.onload = function () {
  addPersoon();
  updateCount();
  setInterval(updateCount, 2000);
};
</script>
